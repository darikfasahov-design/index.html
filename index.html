<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ТЕНЬ В ЛАБИРИНТЕ | Хоррор от первого лица</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            border-radius: 8px;
            padding: 12px 20px;
            border-left: 4px solid #aa0000;
            color: #aa2222;
            font-weight: bold;
            font-family: monospace;
            pointer-events: none;
            font-size: 14px;
        }
        #objective {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 18px;
            border-radius: 8px;
            border-right: 3px solid #ff5555;
            color: #ffaaaa;
            font-family: monospace;
            font-size: 14px;
            text-align: right;
            pointer-events: none;
            z-index: 100;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 16px;
            height: 16px;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255, 80, 80, 0.7);
            border-radius: 50%;
            pointer-events: none;
            z-index: 200;
            box-shadow: 0 0 8px red;
        }
        #message-area {
            position: absolute;
            bottom: 25%;
            left: 0;
            right: 0;
            text-align: center;
            background: rgba(0,0,0,0.85);
            color: #ff6666;
            padding: 20px;
            font-family: monospace;
            font-size: 1.4rem;
            font-weight: bold;
            pointer-events: none;
            z-index: 150;
            transition: 0.3s;
            backdrop-filter: blur(12px);
            border-top: 2px solid red;
            border-bottom: 2px solid red;
        }
        #controls-hint {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 20px;
            color: #888;
            font-size: 11px;
            pointer-events: none;
            z-index: 100;
        }
        #health-bar {
            position: absolute;
            bottom: 30px;
            left: 20px;
            width: 220px;
            height: 14px;
            background: #330000;
            border-radius: 10px;
            overflow: hidden;
            z-index: 100;
            border: 1px solid #aa0000;
        }
        #health-fill {
            width: 100%;
            height: 100%;
            background: #cc0000;
            transition: width 0.2s;
        }
        button {
            position: absolute;
            bottom: 30px;
            right: 20px;
            background: #2a1a1a;
            border: 1px solid #aa4444;
            padding: 10px 20px;
            color: #ffaaaa;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            z-index: 200;
            border-radius: 6px;
            transition: 0.2s;
        }
        button:hover {
            background: #aa3333;
            color: black;
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            100% { transform: translate(-1px, -1px); }
        }
        .shake-effect {
            animation: shake 0.1s ease-in-out 0s 3;
        }
    </style>
</head>
<body>
    <div id="ui">🧠 [СОЗНАНИЕ РАЗРУШАЕТСЯ] ██░░ 35%</div>
    <div id="objective">📜 ЗАДАНИЕ: Найти 5 страниц дневника<br>🔍 Найдено: <span id="foundLogs">0</span> / 5</div>
    <div id="crosshair"></div>
    <div id="message-area" style="opacity:0; visibility:hidden;"></div>
    <div id="controls-hint">🖱️ Мышь: осмотр | W/A/S/D: движение | SHIFT: бег | [E] - взять дневник</div>
    <div id="health-bar"><div id="health-fill" style="width: 100%;"></div></div>
    <button id="resetBtn">💀 ПЕРЕРОДИТЬСЯ 💀</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- СЦЕНА ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, 0.03);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.05, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // --- УПРАВЛЕНИЕ (PointerLock) ---
        const controls = new PointerLockControls(camera, document.body);
        
        // Блокирующий экран
        const blocker = document.createElement('div');
        blocker.style.position = 'absolute';
        blocker.style.top = '0';
        blocker.style.left = '0';
        blocker.style.width = '100%';
        blocker.style.height = '100%';
        blocker.style.backgroundColor = 'rgba(0,0,0,0.95)';
        blocker.style.zIndex = '1000';
        blocker.style.display = 'flex';
        blocker.style.justifyContent = 'center';
        blocker.style.alignItems = 'center';
        blocker.style.fontFamily = 'monospace';
        blocker.style.color = '#ff6666';
        blocker.style.fontSize = '28px';
        blocker.style.flexDirection = 'column';
        blocker.style.cursor = 'pointer';
        blocker.innerHTML = '🔴 КЛИКНИТЕ, ЧТОБЫ ВОЙТИ 🔴<br><span style="font-size:14px; margin-top:20px;">(ESC для освобождения мыши)</span>';
        document.body.appendChild(blocker);
        
        // Позиция игрока
        controls.getObject().position.set(0, 0.9, 0);
        scene.add(controls.getObject());
        
        controls.addEventListener('lock', () => { blocker.style.display = 'none'; });
        controls.addEventListener('unlock', () => { blocker.style.display = 'flex'; });
        
        // Клик для начала
        blocker.addEventListener('click', () => { controls.lock(); });
        
        // --- ОСВЕЩЕНИЕ ---
        const ambient = new THREE.AmbientLight(0x111122);
        scene.add(ambient);
        const mainLight = new THREE.DirectionalLight(0xffaa88, 0.5);
        mainLight.position.set(5, 10, 5);
        scene.add(mainLight);
        const flickerLight = new THREE.PointLight(0xff3300, 0.7, 20);
        flickerLight.position.set(0, 2, 0);
        scene.add(flickerLight);
        
        // --- СТЕНЫ С КОЛЛИЗИЕЙ ---
        const walls = [];
        
        function addWall(x, z, w, h, d) {
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x2a1a2a, roughness: 0.7, metalness: 0.1 });
            const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
            wall.position.set(x, h/2, z);
            wall.castShadow = true;
            wall.receiveShadow = true;
            scene.add(wall);
            walls.push({
                minX: x - w/2,
                maxX: x + w/2,
                minZ: z - d/2,
                maxZ: z + d/2
            });
        }
        
        // Внешние стены
        addWall(0, -10, 22, 3, 1);
        addWall(0, 10, 22, 3, 1);
        addWall(-11, 0, 1, 3, 22);
        addWall(11, 0, 1, 3, 22);
        // Внутренние стены (лабиринт)
        addWall(-5, -3, 1, 2.5, 5);
        addWall(3, -4, 1, 2.5, 4);
        addWall(-2, 2, 6, 2.5, 1);
        addWall(5, 1, 1, 2.5, 5);
        addWall(-4, 5, 1, 2.5, 3);
        addWall(0, -7, 4, 2.5, 1);
        addWall(6, -6, 1, 2.5, 3);
        addWall(-7, 4, 3, 2.5, 1);
        
        // Пол
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.8 });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(22, 22), floorMat);
        floor.rotation.x = -Math.PI/2;
        floor.position.y = -0.1;
        floor.receiveShadow = true;
        scene.add(floor);
        
        // Декоративные серверы
        const serverMat = new THREE.MeshStandardMaterial({ color: 0x331122 });
        for(let i = 0; i < 25; i++) {
            let x = (Math.random() - 0.5) * 16;
            let z = (Math.random() - 0.5) * 15;
            if(Math.abs(x) < 3 && Math.abs(z) < 3) continue;
            const rack = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.2, 0.5), serverMat);
            rack.position.set(x, 0.5, z);
            rack.castShadow = true;
            scene.add(rack);
        }
        
        // --- МОНСТР (ТЕНЬ) ---
        const monster = new THREE.Group();
        const body = new THREE.Mesh(new THREE.SphereGeometry(0.55, 20, 20), 
            new THREE.MeshStandardMaterial({ color: 0x330000, emissive: 0x220000, emissiveIntensity: 0.7 }));
        monster.add(body);
        const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), 
            new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff2222 }));
        eyeL.position.set(-0.35, 0.2, 0.55);
        monster.add(eyeL);
        const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), 
            new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff2222 }));
        eyeR.position.set(0.35, 0.2, 0.55);
        monster.add(eyeR);
        monster.position.set(5, 0.45, 4);
        scene.add(monster);
        
        // --- ПРЕДМЕТЫ (СТРАНИЦЫ) ---
        let items = [];
        let collected = 0;
        let health = 100;
        let gameActive = true;
        let invincibleTimer = 0;
        
        function spawnItems() {
            items.forEach(item => {
                scene.remove(item.group);
                scene.remove(item.label);
            });
            items = [];
            const positions = [
                [-3.5, 0.1, -2], [4.2, 0.1, 1.5], 
                [-1.5, 0.1, 5], [3, 0.1, -3.5], 
                [-4, 0.1, 3.2]
            ];
            for(let i = 0; i < positions.length; i++) {
                const group = new THREE.Group();
                const paper = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.05, 0.35), 
                    new THREE.MeshStandardMaterial({ color: 0xccaa88, emissive: 0x442200 }));
                paper.castShadow = true;
                group.add(paper);
                group.position.set(positions[i][0], positions[i][1], positions[i][2]);
                scene.add(group);
                
                const div = document.createElement('div');
                div.textContent = '📜 СТРАНИЦА';
                div.style.backgroundColor = 'rgba(0,0,0,0.7)';
                div.style.color = '#ffaaaa';
                div.style.padding = '4px 8px';
                div.style.borderRadius = '4px';
                div.style.fontSize = '11px';
                div.style.borderLeft = '2px solid red';
                const label = new CSS2DObject(div);
                label.position.copy(group.position);
                label.position.y += 0.35;
                scene.add(label);
                items.push({ group, label });
            }
        }
        
        function updateUI() {
            document.getElementById('foundLogs').textContent = collected;
            document.getElementById('health-fill').style.width = Math.max(0, health) + '%';
            
            if(health <= 0 && gameActive) {
                gameActive = false;
                const msgDiv = document.getElementById('message-area');
                msgDiv.style.visibility = 'visible';
                msgDiv.style.opacity = '1';
                msgDiv.innerHTML = '💀 ВАС ПОГЛОТИЛА ТЕНЬ... ПЕРЕРОЖДЕНИЕ... 💀';
                setTimeout(() => {
                    health = 70;
                    collected = Math.max(0, collected - 1);
                    gameActive = true;
                    controls.getObject().position.set(0, 0.9, 0);
                    monster.position.set(5, 0.45, 4);
                    updateUI();
                    msgDiv.style.opacity = '0';
                    setTimeout(() => msgDiv.style.visibility = 'hidden', 500);
                }, 2000);
            }
            
            if(collected >= 5 && gameActive) {
                gameActive = false;
                const msgDiv = document.getElementById('message-area');
                msgDiv.style.visibility = 'visible';
                msgDiv.style.opacity = '1';
                msgDiv.innerHTML = '🏆 ВЫ СОБРАЛИ ВСЕ СТРАНИЦЫ. ПОБЕДА! 🏆';
            }
        }
        
        // --- КОЛЛИЗИЯ ---
        function checkCollision(pos) {
            for(let wall of walls) {
                if(pos.x + 0.35 > wall.minX && pos.x - 0.35 < wall.maxX &&
                   pos.z + 0.35 > wall.minZ && pos.z - 0.35 < wall.maxZ) {
                    return true;
                }
            }
            return false;
        }
        
        // --- ДВИЖЕНИЕ (РАБОТАЕТ) ---
        const keyState = {
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
            w: false, s: false, a: false, d: false, Shift: false
        };
        
        window.addEventListener('keydown', (e) => {
            const key = e.key;
            if(key === 'ArrowUp' || key === 'w') keyState.w = true;
            if(key === 'ArrowDown' || key === 's') keyState.s = true;
            if(key === 'ArrowLeft' || key === 'a') keyState.a = true;
            if(key === 'ArrowRight' || key === 'd') keyState.d = true;
            if(key === 'Shift') keyState.Shift = true;
            if(key === 'e' || key === 'E') {
                e.preventDefault();
                const playerPos = controls.getObject().position;
                for(let i = 0; i < items.length; i++) {
                    if(playerPos.distanceTo(items[i].group.position) < 1.1) {
                        scene.remove(items[i].group);
                        scene.remove(items[i].label);
                        items.splice(i, 1);
                        collected++;
                        updateUI();
                        const msgDiv = document.getElementById('message-area');
                        msgDiv.style.visibility = 'visible';
                        msgDiv.style.opacity = '1';
                        msgDiv.innerHTML = `📖 Найдена страница (${collected}/5)`;
                        setTimeout(() => {
                            msgDiv.style.opacity = '0';
                            setTimeout(() => msgDiv.style.visibility = 'hidden', 500);
                        }, 1500);
                        break;
                    }
                }
            }
            if(key === 'Escape' && controls.isLocked) controls.unlock();
        });
        
        window.addEventListener('keyup', (e) => {
            const key = e.key;
            if(key === 'ArrowUp' || key === 'w') keyState.w = false;
            if(key === 'ArrowDown' || key === 's') keyState.s = false;
            if(key === 'ArrowLeft' || key === 'a') keyState.a = false;
            if(key === 'ArrowRight' || key === 'd') keyState.d = false;
            if(key === 'Shift') keyState.Shift = false;
        });
        
        function updateMovement(delta) {
            if(!controls.isLocked || !gameActive) return;
            
            let speed = (keyState.Shift ? 4.5 : 2.8) * delta;
            const move = new THREE.Vector3();
            const forward = controls.getDirection(new THREE.Vector3());
            const right = new THREE.Vector3().crossVectors(new THREE.Vector3(0, 1, 0), forward);
            
            if(keyState.w) move.add(forward);
            if(keyState.s) move.sub(forward);
            if(keyState.d) move.add(right);
            if(keyState.a) move.sub(right);
            move.y = 0;
            move.normalize();
            
            let newPos = controls.getObject().position.clone();
            newPos.x += move.x * speed;
            newPos.z += move.z * speed;
            
            if(!checkCollision(newPos)) {
                controls.getObject().position.copy(newPos);
            } else {
                let tryX = controls.getObject().position.clone();
                tryX.x += move.x * speed;
                if(!checkCollision(tryX)) controls.getObject().position.x = tryX.x;
                
                let tryZ = controls.getObject().position.clone();
                tryZ.z += move.z * speed;
                if(!checkCollision(tryZ)) controls.getObject().position.z = tryZ.z;
            }
        }
        
        // --- МОНСТР ПРЕСЛЕДУЕТ ---
        function updateMonster(delta) {
            if(!gameActive) return;
            
            const playerPos = controls.getObject().position;
            const toPlayer = new THREE.Vector3().subVectors(playerPos, monster.position);
            const dist = toPlayer.length();
            let speed = 1.5 * delta;
            
            if(dist > 0.8) {
                const dir = toPlayer.clone().normalize();
                monster.position.x += dir.x * speed;
                monster.position.z += dir.z * speed;
            }
            monster.lookAt(playerPos);
            
            if(dist < 1.2 && gameActive && health > 0 && invincibleTimer <= 0) {
                health -= 14;
                updateUI();
                document.body.classList.add('shake-effect');
                setTimeout(() => document.body.classList.remove('shake-effect'), 300);
                const pushDir = toPlayer.clone().normalize();
                controls.getObject().position.x += pushDir.x * 1.3;
                controls.getObject().position.z += pushDir.z * 1.3;
                invincibleTimer = 0.8;
            }
            if(invincibleTimer > 0) invincibleTimer -= delta;
            
            flickerLight.intensity = 0.5 + Math.sin(Date.now() * 0.015) * 0.3 + Math.random() * 0.3;
        }
        
        // --- СБРОС ИГРЫ ---
        document.getElementById('resetBtn').addEventListener('click', () => {
            collected = 0;
            health = 100;
            gameActive = true;
            controls.getObject().position.set(0, 0.9, 0);
            monster.position.set(5, 0.45, 4);
            spawnItems();
            updateUI();
        });
        
        // --- АНИМАЦИЯ ---
        let lastTime = performance.now();
        
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            updateMovement(delta);
            updateMonster(delta);
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        spawnItems();
        updateUI();
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('Игра запущена! Кликните по экрану и нажмите W/A/S/D для движения');
    </script>
</body>
</html>
