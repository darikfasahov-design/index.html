<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТЕСТОВАЯ ИГРА - ПРОВЕРКА ДВИЖЕНИЯ</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: monospace; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: black;
            color: lime;
            padding: 10px;
            border-radius: 5px;
            z-index: 100;
            font-size: 14px;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: black;
            color: white;
            padding: 10px;
            border-radius: 5px;
            z-index: 100;
            font-size: 12px;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            border: 2px solid red;
            border-radius: 50%;
            pointer-events: none;
            z-index: 200;
        }
    </style>
</head>
<body>
    <div id="info">
        🎮 СТАТУС: <span id="status">Ожидание клика</span><br>
        📍 ПОЗИЦИЯ: <span id="pos">0, 0, 0</span>
    </div>
    <div id="controls">
        🖱️ КЛИКНИТЕ ПО ЭКРАНУ → ДВИГАЙТЕСЬ (W/A/S/D)<br>
        🖱️ МЫШЬ = поворот камеры | ESC = освободить мышь
    </div>
    <div id="crosshair"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- ПРОСТАЯ СЦЕНА ДЛЯ ТЕСТА ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);
        scene.fog = new THREE.Fog(0x111122, 10, 30);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        // --- УПРАВЛЕНИЕ ---
        const controls = new PointerLockControls(camera, document.body);
        
        // Экран блокировки
        const blocker = document.createElement('div');
        blocker.style.position = 'absolute';
        blocker.style.top = '0';
        blocker.style.left = '0';
        blocker.style.width = '100%';
        blocker.style.height = '100%';
        blocker.style.backgroundColor = 'rgba(0,0,0,0.9)';
        blocker.style.display = 'flex';
        blocker.style.justifyContent = 'center';
        blocker.style.alignItems = 'center';
        blocker.style.flexDirection = 'column';
        blocker.style.zIndex = '1000';
        blocker.style.cursor = 'pointer';
        blocker.style.fontFamily = 'monospace';
        blocker.style.fontSize = '24px';
        blocker.style.color = '#ff6666';
        blocker.innerHTML = '🔴 КЛИКНИТЕ СЮДА, ЧТОБЫ НАЧАТЬ 🔴<br><span style="font-size:14px; margin-top:20px;">(После клика курсор исчезнет)</span>';
        document.body.appendChild(blocker);
        
        // Позиция игрока
        controls.getObject().position.set(0, 0.8, 0);
        scene.add(controls.getObject());
        
        // События блокировки
        controls.addEventListener('lock', () => {
            blocker.style.display = 'none';
            document.getElementById('status').textContent = 'ИГРА АКТИВНА - ДВИГАЙТЕСЬ!';
            document.getElementById('status').style.color = '#00ff00';
        });
        
        controls.addEventListener('unlock', () => {
            blocker.style.display = 'flex';
            document.getElementById('status').textContent = 'Ожидание клика';
            document.getElementById('status').style.color = '#ff6666';
        });
        
        // Клик для старта
        blocker.addEventListener('click', () => {
            controls.lock();
        });
        
        // --- ПРОСТАЯ АРЕНА (пол и стены)---
        // Пол
        const gridHelper = new THREE.GridHelper(20, 20, 0x00ff00, 0x444444);
        gridHelper.position.y = -0.5;
        scene.add(gridHelper);
        
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.MeshStandardMaterial({ color: 0x224422, side: THREE.DoubleSide })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.5;
        floor.receiveShadow = true;
        scene.add(floor);
        
        // Стены для ориентира
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x884444 });
        const walls = [
            { pos: [0, 1, -8], scale: [16, 2, 0.5] },
            { pos: [0, 1, 8], scale: [16, 2, 0.5] },
            { pos: [-8, 1, 0], scale: [0.5, 2, 16] },
            { pos: [8, 1, 0], scale: [0.5, 2, 16] }
        ];
        walls.forEach(w => {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(w.scale[0], w.scale[1], w.scale[2]), wallMat);
            wall.position.set(w.pos[0], w.pos[1], w.pos[2]);
            wall.castShadow = true;
            scene.add(wall);
        });
        
        // Несколько цветных кубов для ориентира
        const colors = [0xff0000, 0x00ff00, 0x0000ff, 0xffff00, 0xff00ff];
        for(let i = 0; i < 5; i++) {
            const cube = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({ color: colors[i] }));
            cube.position.set(-5 + i * 2.5, 0, -3);
            cube.castShadow = true;
            scene.add(cube);
        }
        
        // Освещение
        const ambient = new THREE.AmbientLight(0x333333);
        scene.add(ambient);
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 5);
        light.castShadow = true;
        scene.add(light);
        const fillLight = new THREE.PointLight(0x2266ff, 0.5);
        fillLight.position.set(0, 2, 0);
        scene.add(fillLight);
        
        // --- УПРАВЛЕНИЕ (ПРОСТЕЙШЕЕ)---
        const keyState = { w: false, s: false, a: false, d: false };
        
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if(key === 'w') keyState.w = true;
            if(key === 's') keyState.s = true;
            if(key === 'a') keyState.a = true;
            if(key === 'd') keyState.d = true;
            if(key === 'escape' && controls.isLocked) controls.unlock();
            e.preventDefault();
        });
        
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if(key === 'w') keyState.w = false;
            if(key === 's') keyState.s = false;
            if(key === 'a') keyState.a = false;
            if(key === 'd') keyState.d = false;
        });
        
        let moveSpeed = 5.0;
        
        function updateMovement(delta) {
            if(!controls.isLocked) return;
            
            const actualSpeed = moveSpeed * delta;
            const forward = controls.getDirection(new THREE.Vector3());
            const right = new THREE.Vector3().crossVectors(new THREE.Vector3(0, 1, 0), forward);
            
            let move = new THREE.Vector3();
            if(keyState.w) move.add(forward);
            if(keyState.s) move.sub(forward);
            if(keyState.d) move.add(right);
            if(keyState.a) move.sub(right);
            move.y = 0;
            
            if(move.length() > 0) move.normalize();
            
            controls.getObject().position.x += move.x * actualSpeed;
            controls.getObject().position.z += move.z * actualSpeed;
            
            // Ограничение арены
            const limit = 7;
            controls.getObject().position.x = Math.min(limit, Math.max(-limit, controls.getObject().position.x));
            controls.getObject().position.z = Math.min(limit, Math.max(-limit, controls.getObject().position.z));
            
            // Обновление UI
            const pos = controls.getObject().position;
            document.getElementById('pos').textContent = `${pos.x.toFixed(2)}, ${pos.y.toFixed(2)}, ${pos.z.toFixed(2)}`;
        }
        
        // --- АНИМАЦИЯ ---
        let lastTime = performance.now();
        
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            updateMovement(delta);
            
            // Маленькая анимация света
            fillLight.intensity = 0.5 + Math.sin(Date.now() * 0.003) * 0.2;
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // Адаптация под размер окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('✅ Игра загружена! КЛИКНИТЕ по экрану и нажмите W/A/S/D');
    </script>
</body>
</html>
