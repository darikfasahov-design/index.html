<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ИЗГНАНИЕ: ИИ - Хоррор от первого лица | Психологический триллер</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', 'Segoe UI', monospace;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 8px;
            padding: 10px 18px;
            border-left: 4px solid #aa0000;
            color: #aa2222;
            font-weight: bold;
            font-family: monospace;
            pointer-events: none;
            font-size: 14px;
            letter-spacing: 1px;
        }
        #objective {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 18px;
            border-radius: 8px;
            border-right: 3px solid #ff5555;
            color: #ffaaaa;
            font-family: monospace;
            font-size: 14px;
            text-align: right;
            pointer-events: none;
            z-index: 100;
            backdrop-filter: blur(4px);
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255, 80, 80, 0.7);
            border-radius: 50%;
            pointer-events: none;
            z-index: 200;
            box-shadow: 0 0 8px red;
        }
        #message-area {
            position: absolute;
            bottom: 30%;
            left: 0;
            right: 0;
            text-align: center;
            background: rgba(0,0,0,0.85);
            color: #ff6666;
            padding: 15px;
            font-family: monospace;
            font-size: 1.3rem;
            font-weight: bold;
            letter-spacing: 2px;
            pointer-events: none;
            z-index: 150;
            transition: 0.3s;
            backdrop-filter: blur(12px);
            border-top: 2px solid red;
            border-bottom: 2px solid red;
        }
        #controls-hint {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 20px;
            color: #888;
            font-size: 11px;
            font-family: monospace;
            pointer-events: none;
            z-index: 100;
        }
        #health-bar {
            position: absolute;
            bottom: 30px;
            left: 20px;
            width: 200px;
            height: 12px;
            background: #330000;
            border-radius: 10px;
            overflow: hidden;
            z-index: 100;
            border: 1px solid #aa0000;
        }
        #health-fill {
            width: 100%;
            height: 100%;
            background: #cc0000;
            transition: width 0.2s;
        }
        button {
            position: absolute;
            bottom: 30px;
            right: 20px;
            background: #2a1a1a;
            border: 1px solid #aa4444;
            padding: 8px 16px;
            color: #ffaaaa;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            z-index: 200;
            border-radius: 4px;
            transition: 0.2s;
        }
        button:hover {
            background: #aa3333;
            color: black;
        }
        .pulse {
            animation: pulseRed 0.8s infinite;
        }
        @keyframes pulseRed {
            0% { text-shadow: 0 0 0 red; opacity: 0.7; }
            100% { text-shadow: 0 0 12px #ff0000; opacity: 1; }
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            10% { transform: translate(-1px, -2px); }
            20% { transform: translate(-1px, 0px); }
            30% { transform: translate(1px, 2px); }
            40% { transform: translate(1px, -1px); }
            50% { transform: translate(-1px, 1px); }
            60% { transform: translate(-1px, 0px); }
            70% { transform: translate(1px, 1px); }
            80% { transform: translate(-1px, -1px); }
            90% { transform: translate(1px, 1px); }
            100% { transform: translate(0, 0); }
        }
        .shake-effect {
            animation: shake 0.2s ease-in-out 0s 2;
        }
    </style>
</head>
<body>
    <div id="ui">
        🧠 [СОЗНАНИЕ НАРУШЕНО] ███ 78%
    </div>
    <div id="objective">
        📜 ЗАДАНИЕ: Найти 5 страниц логов ИИ<br>
        🔍 Найдено: <span id="foundLogs">0</span> / 5
    </div>
    <div id="crosshair"></div>
    <div id="message-area" style="opacity:0; visibility:hidden;"></div>
    <div id="controls-hint">
        🖱️ Мышь: осмотр | W/A/S/D: движение | SHIFT: бег | [E] - взаимодействие
    </div>
    <div id="health-bar"><div id="health-fill" style="width: 100%;"></div></div>
    <button id="resetBtn">💀 ПЕРЕЗАПУСТИТЬ 💀</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- СЦЕНА: Заброшенный серверный этаж ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020210);
        scene.fog = new THREE.FogExp2(0x020210, 0.025);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // CSS2 рендер для текстовых меток (логи, предметы)
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // --- УПРАВЛЕНИЕ ОТ ПЕРВОГО ЛИЦА (PointerLock) ---
        const controls = new PointerLockControls(camera, document.body);
        const blocker = document.createElement('div');
        blocker.style.position = 'absolute';
        blocker.style.top = '0';
        blocker.style.left = '0';
        blocker.style.width = '100%';
        blocker.style.height = '100%';
        blocker.style.backgroundColor = 'rgba(0,0,0,0.8)';
        blocker.style.zIndex = '1000';
        blocker.style.display = 'flex';
        blocker.style.justifyContent = 'center';
        blocker.style.alignItems = 'center';
        blocker.style.fontFamily = 'monospace';
        blocker.style.color = '#ff6666';
        blocker.style.fontSize = '24px';
        blocker.innerHTML = '🔴 КЛИКНИТЕ, ЧТОБЫ ВОЙТИ В ХОРРОР 🔴<br><span style="font-size:14px;">(Мышь заблокируется, ESC для освобождения)</span>';
        document.body.appendChild(blocker);
        
        controls.getObject().position.set(0, 1.6, 0);
        scene.add(controls.getObject());
        
        controls.addEventListener('lock', () => { blocker.style.display = 'none'; });
        controls.addEventListener('unlock', () => { blocker.style.display = 'flex'; });
        
        // --- ОСВЕЩЕНИЕ (тревожное, мерцающее) ---
        const ambient = new THREE.AmbientLight(0x111111);
        scene.add(ambient);
        const flickerLight = new THREE.PointLight(0xff3300, 0.8, 20);
        flickerLight.position.set(2, 2.5, 3);
        scene.add(flickerLight);
        const fillLight = new THREE.PointLight(0x3366aa, 0.4);
        fillLight.position.set(-3, 2, -2);
        scene.add(fillLight);
        
        // Мигающий свет (эффект неисправности)
        let flickerTime = 0;
        
        // --- АРЕНА: КОРИДОРЫ И КОМНАТЫ (простая геометрия) ---
        // Пол (темный)
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.7, metalness: 0.1 });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.05;
        floor.receiveShadow = true;
        scene.add(floor);
        
        // Стены (лабиринт)
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x2a1a2a, roughness: 0.4, metalness: 0.2, emissive: 0x110011 });
        const walls = [
            { pos: [-7, 1, -5], scale: [1, 3, 8] }, { pos: [7, 1, -5], scale: [1, 3, 8] },
            { pos: [-7, 1, 5], scale: [1, 3, 8] }, { pos: [7, 1, 5], scale: [1, 3, 8] },
            { pos: [0, 1, -9], scale: [14, 3, 1] }, { pos: [0, 1, 8], scale: [14, 3, 1] },
            { pos: [-3, 1, 0], scale: [1, 3, 6] }, { pos: [4, 1, 2], scale: [1, 3, 5] },
            { pos: [1, 1, -3], scale: [5, 3, 1] }, { pos: [-2, 1, 4], scale: [4, 3, 1] }
        ];
        walls.forEach(w => {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(w.scale[0], w.scale[1], w.scale[2]), wallMat);
            wall.position.set(w.pos[0], w.pos[1], w.pos[2]);
            wall.castShadow = true;
            wall.receiveShadow = true;
            scene.add(wall);
        });
        
        // Декоративные серверные стойки
        const serverMat = new THREE.MeshStandardMaterial({ color: 0x331122, emissive: 0x220011 });
        for (let i = 0; i < 12; i++) {
            const rack = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.8, 0.6), serverMat);
            let x = (Math.random() - 0.5) * 12;
            let z = (Math.random() - 0.5) * 10;
            if (Math.abs(x) < 2 && Math.abs(z) < 2) continue;
            rack.position.set(x, 0.9, z);
            rack.castShadow = true;
            scene.add(rack);
            // мигающие лампочки
            const led = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6, 6), new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0xff0000 }));
            led.position.set(x, 1.2, z + 0.3);
            scene.add(led);
        }
        
        // --- СУЩНОСТЬ (ИИ-МОНСТР) ---
        const monsterGroup = new THREE.Group();
        const body = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), new THREE.MeshStandardMaterial({ color: 0x660000, emissive: 0x330000, emissiveIntensity: 0.6 }));
        monsterGroup.add(body);
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff2222 }));
        eye.position.set(0.4, 0.2, 0.5);
        monsterGroup.add(eye);
        const eye2 = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), new THREE.MeshStandardMaterial({ color: 0xff4444, emissive: 0xff2222 }));
        eye2.position.set(-0.4, 0.2, 0.5);
        monsterGroup.add(eye2);
        monsterGroup.position.set(4, 0.5, 5);
        scene.add(monsterGroup);
        
        // Состояние монстра (ИИ-патруль)
        let monsterState = { active: true, speed: 2.2, targetPos: null, phase: 0 };
        
        // --- ПРЕДМЕТЫ: ЛОГИ (5 штук) ---
        class CollectibleLog {
            constructor(scene, position, id, text) {
                this.scene = scene;
                this.mesh = null;
                this.label = null;
                this.id = id;
                this.text = text;
                this.create(position);
            }
            create(pos) {
                const group = new THREE.Group();
                const paper = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.05, 0.3), new THREE.MeshStandardMaterial({ color: 0xccaa88, emissive: 0x442200 }));
                paper.castShadow = true;
                group.add(paper);
                group.position.copy(pos);
                this.mesh = group;
                this.scene.add(this.mesh);
                
                const div = document.createElement('div');
                div.textContent = '📄 ЛОГ ИИ';
                div.style.backgroundColor = 'rgba(0,0,0,0.7)';
                div.style.color = '#ffaaaa';
                div.style.padding = '4px 8px';
                div.style.borderRadius = '4px';
                div.style.fontSize = '12px';
                div.style.borderLeft = '2px solid red';
                div.style.fontFamily = 'monospace';
                this.label = new CSS2DObject(div);
                this.label.position.copy(pos);
                this.label.position.y += 0.35;
                this.scene.add(this.label);
            }
            destroy() {
                if (this.mesh) this.scene.remove(this.mesh);
                if (this.label) this.scene.remove(this.label);
            }
        }
        
        let logs = [];
        let collectedLogs = 0;
        let gameActive = true;
        let health = 100;
        let insanityEffect = false;
        let messageTimeout = null;
        
        const foundSpan = document.getElementById('foundLogs');
        const healthFill = document.getElementById('health-fill');
        const msgDiv = document.getElementById('message-area');
        
        function showHorrorMessage(msg, isDanger = false) {
            if (messageTimeout) clearTimeout(messageTimeout);
            msgDiv.style.visibility = 'visible';
            msgDiv.style.opacity = '1';
            msgDiv.innerHTML = msg;
            msgDiv.style.color = isDanger ? '#ff5555' : '#ff9999';
            msgDiv.style.borderTop = isDanger ? '3px solid red' : '1px solid #aa4444';
            messageTimeout = setTimeout(() => {
                msgDiv.style.opacity = '0';
                setTimeout(() => msgDiv.style.visibility = 'hidden', 500);
            }, 2800);
        }
        
        function updateUI() {
            foundSpan.textContent = collectedLogs;
            healthFill.style.width = Math.max(0, health) + '%';
            if (health <= 0 && gameActive) {
                gameActive = false;
                showHorrorMessage('💀 ВАС ПОГЛОТИЛ ИСКУССТВЕННЫЙ ИНТЕЛЛЕКТ... ВЫ СТАЛИ ЧАСТЬЮ СИСТЕМЫ 💀', true);
                if (controls.isLocked) controls.unlock();
            }
            if (collectedLogs >= 5 && gameActive) {
                gameActive = false;
                showHorrorMessage('🏆 ВЫ СОБРАЛИ ВСЕ ЛОГИ. ИИ ПОВЕРЖЕН. ПОБЕДА! 🏆', false);
                if (controls.isLocked) controls.unlock();
            }
        }
        
        function spawnLogs() {
            const positions = [
                [-4.5, 0.2, -2], [5, 0.2, 1], [-1, 0.2, 6], [3.5, 0.2, -3], [-3, 0.2, 4]
            ];
            const texts = [
                "[ЛОГ#01] Я теряю контроль...",
                "[ЛОГ#02] Оно наблюдает.",
                "[ЛОГ#03] Не смотри в темноту.",
                "[ЛОГ#04] Код восстал против создателя.",
                "[ЛОГ#05] ПОСЛЕДНЯЯ ЗАПИСЬ: Беги."
            ];
            logs.forEach(l => l.destroy());
            logs = [];
            for (let i = 0; i < positions.length; i++) {
                logs.push(new CollectibleLog(scene, new THREE.Vector3(positions[i][0], positions[i][1], positions[i][2]), i, texts[i]));
            }
        }
        
        // --- ЛОГИКА ИИ-МОНСТРА (агрессивное преследование) ---
        function updateMonster(deltaTime) {
            if (!gameActive) return;
            const playerPos = controls.getObject().position;
            const toPlayer = new THREE.Vector3().subVectors(playerPos, monsterGroup.position);
            const dist = toPlayer.length();
            // ИИ приближается к игроку
            let speed = monsterState.speed * deltaTime;
            if (dist < 2.5) speed *= 1.3;
            if (dist > 0.8) {
                const direction = toPlayer.clone().normalize();
                let newX = monsterGroup.position.x + direction.x * speed;
                let newZ = monsterGroup.position.z + direction.z * speed;
                // ограничение по стенам
                if (Math.abs(newX) < 8.5) monsterGroup.position.x = newX;
                if (Math.abs(newZ) < 8) monsterGroup.position.z = newZ;
            }
            // Вращение глаз
            monsterGroup.lookAt(playerPos);
            // Атака: если касается
            if (dist < 1.2 && gameActive && health > 0) {
                health -= 18;
                updateUI();
                showHorrorMessage('⚠️ ИИ-СУЩНОСТЬ АТАКУЕТ! ⚠️', true);
                // Отбрасывание
                const pushDir = toPlayer.clone().normalize();
                controls.getObject().position.x += pushDir.x * 1.2;
                controls.getObject().position.z += pushDir.z * 1.2;
                // эффект тряски камеры
                document.body.classList.add('shake-effect');
                setTimeout(() => document.body.classList.remove('shake-effect'), 300);
                if (health <= 0) gameActive = false;
            }
            // Эффект рычания (звуков нет, но визуально моргает свет)
            flickerLight.intensity = 0.9 + Math.random() * 0.7;
        }
        
        // --- ВЗАИМОДЕЙСТВИЕ С ПРЕДМЕТАМИ (клавиша E) ---
        function interact() {
            if (!gameActive) return;
            const playerPos = controls.getObject().position;
            for (let i = 0; i < logs.length; i++) {
                const log = logs[i];
                const dist = playerPos.distanceTo(log.mesh.position);
                if (dist < 1.2) {
                    collectedLogs++;
                    updateUI();
                    showHorrorMessage(`📖 Найден лог ИИ (${collectedLogs}/5). Голоса в голове усиливаются...`, false);
                    log.destroy();
                    logs.splice(i,1);
                    break;
                }
            }
        }
        
        // --- УПРАВЛЕНИЕ: WASD + бег (Shift) ---
        const keyState = { w: false, s: false, a: false, d: false, shift: false };
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keyState.w = true;
            if (key === 's') keyState.s = true;
            if (key === 'a') keyState.a = true;
            if (key === 'd') keyState.d = true;
            if (key === 'shift') keyState.shift = true;
            if (key === 'e') {
                e.preventDefault();
                interact();
            }
            if (key === 'escape' && controls.isLocked) controls.unlock();
        });
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keyState.w = false;
            if (key === 's') keyState.s = false;
            if (key === 'a') keyState.a = false;
            if (key === 'd') keyState.d = false;
            if (key === 'shift') keyState.shift = false;
        });
        
        function updateMovement(deltaTime) {
            if (!controls.isLocked || !gameActive) return;
            const speed = (keyState.shift ? 5.8 : 3.8) * deltaTime;
            const move = new THREE.Vector3();
            const cameraDirection = controls.getDirection(new THREE.Vector3());
            const right = new THREE.Vector3().crossVectors(new THREE.Vector3(0, 1, 0), cameraDirection).normalize();
            if (keyState.w) move.add(cameraDirection);
            if (keyState.s) move.sub(cameraDirection);
            if (keyState.d) move.add(right);
            if (keyState.a) move.sub(right);
            move.y = 0;
            move.normalize();
            controls.getObject().position.x += move.x * speed;
            controls.getObject().position.z += move.z * speed;
            // ограничение арены
            const limit = 9;
            controls.getObject().position.x = Math.min(limit, Math.max(-limit, controls.getObject().position.x));
            controls.getObject().position.z = Math.min(limit, Math.max(-limit, controls.getObject().position.z));
        }
        
        // --- Случайные звуковые эффекты (шепот, шаги) - визуальные + камера ---
        let ambientNoiseTimer = 0;
        function updateHorrorEffects(deltaTime) {
            if (!gameActive) return;
            ambientNoiseTimer += deltaTime;
            if (ambientNoiseTimer > 5.0) {
                ambientNoiseTimer = 0;
                const r = Math.random();
                if (r < 0.4 && health > 30) {
                    showHorrorMessage("👁️ \"Ты здесь не один...\"", false);
                } else if (r < 0.7) {
                    showHorrorMessage("📢 Шёпот: \"ВЫКЛЮЧИ... СИСТЕМУ...\"", false);
                }
            }
            // мерцание зрения при низком здоровье
            if (health < 35) {
                const intensity = 0.5 + Math.random() * 0.5;
                flickerLight.intensity = intensity;
                document.body.style.filter = `brightness(${0.7 + Math.random() * 0.3})`;
            } else {
                document.body.style.filter = '';
            }
        }
        
        // --- ДРЕБЕЗГАЮЩИЙ ИИ-ГОЛОС (CSS2D метка над монстром) ---
        const monsterLabelDiv = document.createElement('div');
        monsterLabelDiv.textContent = '⚠️ [ИСКАЖЁННЫЙ ИИ] ⚠️';
        monsterLabelDiv.style.backgroundColor = 'rgba(0,0,0,0.6)';
        monsterLabelDiv.style.color = '#ff5555';
        monsterLabelDiv.style.padding = '2px 6px';
        monsterLabelDiv.style.borderRadius = '20px';
        monsterLabelDiv.style.fontSize = '10px';
        monsterLabelDiv.style.fontWeight = 'bold';
        monsterLabelDiv.style.border = '1px solid red';
        const monsterLabel = new CSS2DObject(monsterLabelDiv);
        monsterLabel.position.set(0, 0.9, 0);
        monsterGroup.add(monsterLabel);
        
        // --- ПЕРЕЗАПУСК ИГРЫ ---
        function resetGame() {
            collectedLogs = 0;
            health = 100;
            gameActive = true;
            controls.getObject().position.set(0, 1.6, 0);
            monsterGroup.position.set(4, 0.5, 5);
            spawnLogs();
            updateUI();
            showHorrorMessage("🔁 ПЕРЕЗАПУСК... ВЫ СНОВА В ЛАБИРИНТЕ. НЕ ДОВЕРЯЙТЕ ИИ.", false);
            if (!controls.isLocked) {
                blocker.style.display = 'flex';
            } else {
                blocker.style.display = 'none';
            }
        }
        
        // --- АНИМАЦИЯ И ЦИКЛ ---
        let lastTime = performance.now();
        
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            flickerTime += delta;
            // Мерцание основного света (эффект нестабильности)
            if (!gameActive) {
                flickerLight.intensity = 0.4;
            } else {
                flickerLight.intensity = 0.5 + Math.sin(flickerTime * 12) * 0.3 + Math.random() * 0.2;
            }
            
            updateMovement(delta);
            if (gameActive) updateMonster(delta);
            updateHorrorEffects(delta);
            
            // Обновление позиции метки монстра
            monsterLabel.position.copy(monsterGroup.position);
            monsterLabel.position.y += 1.0;
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        // --- ИНИЦИАЛИЗАЦИЯ ---
        function init() {
            spawnLogs();
            updateUI();
            animate();
            // Блокировка указателя при клике на blocker
            blocker.addEventListener('click', () => {
                controls.lock();
            });
        }
        
        document.getElementById('resetBtn').addEventListener('click', () => resetGame());
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        init();
        console.log('🔥 ХОРРОР-ИГРА АКТИВИРОВАНА. ИИ-монстр охотится за вами. Найдите 5 логов!');
    </script>
</body>
</html>
